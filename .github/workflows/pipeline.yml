name: CI/CD Pipeline

on: [push, pull_request]

defaults:
    run:
      working-directory: HelloWorldDevOps

jobs:
  # JOB 1: Build and Test
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build and Test with Maven
        run: mvn clean verify

  # JOB 2: Secret Scanning (TruffleHog)
  security-secrets:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          base: ""
          head: HEAD
          extraArgs: --debug --only-verified

  # JOB 3: Vulnerability Scanning (Trivy)
  security-container:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t hello-world-app:latest .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hello-world-app:latest'
          format: 'table'
          exit-code: '1' # Fails the pipeline if vulnerabilities are found
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # JOB 4: Release (Publish Image)
  release:
    needs: [build-and-test]
    # This job ONLY runs when you push a Git Tag (e.g., v1.0.0)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          # Use your folder name for context
          IMAGE_NAME=ghcr.io/milosmrdja/hello-world-app
          TAG=${{ github.ref_name }}
          docker build -t $IMAGE_NAME:$TAG .
          docker push $IMAGE_NAME:$TAG